language: rust
matrix:
    fast_finish: true
    allow_failures:
        - rust: nightly
    include:
        - os: osx
          rust: stable

        - rust: stable
          env: FEATURES=""
        - rust: beta
          env: FEATURES=""
        - rust: nightly
          env: FEATURES=""

sudo: false
dist: trusty

cache:
  apt: true

script:
  - cargo build $FEATURES
  - cargo test -v $FEATURES
